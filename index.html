<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un mensaje especial 💌</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-cyan-solid">
        
        <div id="video-call-overlay" class="hidden">
            <div class="call-content">
                <div class="avatar-pulse">👤</div>
                <h2>Iniciando videollamada...</h2>
                <p>Conectando con cámara frontal...</p>
                <div class="call-icons">
                    <span class="icon-red">📞</span>
                    <span class="icon-green">🎥</span>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="envelope-wrapper" id="envelope">
                
                <div class="envelope-back"></div>

                <div class="card" id="card">
                    <span class="card-text">¡FELIZ CUMPLEAÑOS! </span>
                    <span class="card-text">abre el regalo 🎁</span>
                    <button type="button" class="gift-button" id="btn-gift">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <polyline points="20 12 20 22 4 22 4 12"></polyline>
                            <rect x="2" y="7" width="20" height="5"></rect>
                            <line x1="12" y1="22" x2="12" y2="7"></line>
                            <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                            <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
                        </svg>
                        <span>ABRIR REGALO</span>
                    </button>
                </div>

                <svg class="envelope-shapes" viewBox="0 0 500 350" preserveAspectRatio="none">
                    <path d="M 0 0 L 250 175 L 0 350 Z" fill="#fde047" stroke="black" stroke-width="3" />
                    <path d="M 500 0 L 250 175 L 500 350 Z" fill="#fde047" stroke="black" stroke-width="3" />
                    <path d="M 0 350 L 250 175 L 500 350 Z" fill="#fde047" stroke="black" stroke-width="3" />
                </svg>

                <div class="envelope-flap" id="flap">
                    <svg width="100%" height="100%" viewBox="0 0 500 175" preserveAspectRatio="none">
                        <path d="M 0 0 L 250 175 L 500 0 Z" fill="#fde047" stroke="black" stroke-width="3" />
                    </svg>
                </div>

                <div class="star-container">
                    <svg width="70" height="70" viewBox="0 0 24 24" fill="#fef08a" stroke="black" stroke-width="1.5">
                        <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.869 1.4-8.168L.132 9.21l8.2-1.192z" />
                    </svg>
                </div>
            </div>

            <p class="instruction" id="status-text">Toca el sobre, hay algo para ti...</p>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
